name: Deploy BigBang CRM to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Cache-bust assets bằng commit SHA (để điện thoại/máy luôn nhận bản mới)
        run: |
          SHA="${GITHUB_SHA::8}"
          sed -i "s|app.js?v=[^\"]*|app.js?v=$SHA|g; s|sync.js?v=[^\"]*|sync.js?v=$SHA|g; s|style.css?v=[^\"]*|style.css?v=$SHA|g" index.html
          echo "Đã gắn version $SHA vào app.js/sync.js/style.css"
          grep -n "?v=" index.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
